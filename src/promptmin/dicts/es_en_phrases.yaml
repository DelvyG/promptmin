# Spanish -> English PHRASE-level translation patterns.
#
# WHY this file exists separate from es_en.yaml:
# Word-level substitutions (trabajo -> job, función -> func) often FAIL to
# save tokens on modern tokenizers (o200k_base / gpt-4o) because BPE merges
# like "una función" are more efficient than "una func". Inserting an English
# word in the middle of Spanish text can even INCREASE tokens.
#
# The solution is to rewrite LARGER chunks of Spanish at once into English,
# so BPE merges align with the English side. These patterns capture common
# Spanish prompt boilerplate (politeness + imperative + common verbs) and
# map them to compact English.
#
# Every pattern is validated at runtime against the active tokenizer. If a
# pattern does not reduce tokens, it is skipped automatically.

# --- politeness + imperative openers --------------------------------------
"por favor, desarrolla una": "build a"
"por favor, desarrolla un": "build a"
"por favor, desarrollen una": "build a"
"por favor, desarrollen un": "build a"
"por favor, crea una": "create a"
"por favor, crea un": "create a"
"por favor, implementa una": "implement a"
"por favor, implementa un": "implement a"
"por favor, implementa el": "implement the"
"por favor, implementa la": "implement the"
"por favor, escribe una": "write a"
"por favor, escribe un": "write a"
"por favor, genera una": "generate a"
"por favor, genera un": "generate a"
"por favor, revisa este": "review this"
"por favor, revisa esta": "review this"
"por favor, arregla este": "fix this"
"por favor, arregla esta": "fix this"
"por favor, explica": "explain"
"por favor, explica cómo": "explain how"
"por favor, explica como": "explain how"
"por favor, muestra": "show"
"por favor, dime": "tell me"

