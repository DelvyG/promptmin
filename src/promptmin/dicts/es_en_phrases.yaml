"me gustaría que desarrolles": "build"
"me gustaria que crees": "create"
"me gustaría que crees": "create"
"me gustaria que implementes": "implement"
"me gustaría que implementes": "implement"
"me gustaria que revises": "review"
"me gustaría que revises": "review"
"me gustaria que escribas": "write"
"me gustaría que escribas": "write"
"me gustaria saber": "tell me"
"me gustaría saber": "tell me"
"me gustaria entender": "explain"
"me gustaría entender": "explain"
"necesito que desarrolles": "build"
"necesito que crees": "create"
"necesito que implementes": "implement"
"necesito que revises": "review"
"necesito que escribas": "write"
"necesito que expliques": "explain"
"necesito entender": "explain"
"quiero que desarrolles": "build"
"quiero que crees": "create"
"quiero que implementes": "implement"
"quiero que me expliques": "explain"
"quisiera que": ""

